name: Build and Release

on:
  push:
    tags:
      - "v*"
      - "V*"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "Release"
        type: choice
        options:
          - Release
          - Debug
      skip_tests:
        description: "Skip tests"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    env:
      BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-22.04
            package_ext: tar.xz
            output_name: QmClient-ubuntu.tar.xz
            artifact_name: packaged-linux
          - name: Windows
            os: windows-2022
            package_ext: zip
            output_name: QmClient-windows.zip
            artifact_name: packaged-windows
          - name: macOS
            os: macos-14
            package_ext: dmg
            output_name: QmClient-macOS.dmg
            artifact_name: packaged-macos

    steps:
      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: $TAG_VERSION"
            echo "Expected format: v1.2.3"
            exit 1
          fi
          echo "Tag version: $TAG_VERSION"

      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h

      - name: Checkout source
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Update version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_VERSION#v}"
          echo "Updating TCLIENT_VERSION to $VERSION"
          sed -i 's/^#define TCLIENT_VERSION ".*"/#define TCLIENT_VERSION "'"$VERSION"'"/' src/game/version.h
          echo "Updated version.h:"
          grep "TCLIENT_VERSION" src/game/version.h

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cache CMake build
        uses: actions/cache@v5
        with:
          path: |
            build/_deps
          key: cmake-${{ runner.os }}-${{ runner.arch }}-${{ env.BUILD_TYPE }}-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake') }}
          restore-keys: cmake-${{ runner.os }}-${{ runner.arch }}-${{ env.BUILD_TYPE }}-

      - name: Cache Homebrew packages
        if: runner.os == 'macOS'
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-${{ runner.os }}-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: homebrew-${{ runner.os }}-

      - name: Reinstall ccache (macOS)
        if: runner.os == 'macOS'
        run: brew reinstall ccache

      - name: Setup ccache (Linux/macOS)
        if: runner.os != 'Windows'
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          key: ${{ runner.os }}-${{ runner.arch }}
          max-size: 500M

      - name: Setup sccache (Windows)
        if: runner.os == 'Windows'
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Cache apt dependencies
        if: runner.os == 'Linux'
        uses: actions/cache@v5
        with:
          path: |
            /var/cache/apt/archives/*.deb
            /var/lib/apt/lists
          key: apt-linux-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config python3 python3-pip \
            libfreetype6-dev libnotify-dev libsdl2-dev libsqlite3-dev \
            libgl1-mesa-dev \
            libvulkan-dev glslang-tools spirv-tools \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswresample-dev libswscale-dev libx264-dev \
            libpng-dev libwebp-dev libcurl4-openssl-dev libssl-dev \
            libogg-dev libopus-dev libopusfile-dev libwavpack-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          export HOMEBREW_NO_AUTO_UPDATE=1
          brew install \
            cmake ninja pkg-config python \
            freetype sdl2 libpng webp libogg opus opusfile sqlite wavpack ffmpeg
          python3 -m venv .venv-dmgbuild
          . .venv-dmgbuild/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dmgbuild
          echo "${PWD}/.venv-dmgbuild/bin" >> "$GITHUB_PATH"

      - name: Copy WebP libraries for macOS
        if: runner.os == 'macOS'
        run: |
          WEBP_LIBDIR=$(brew --prefix webp)/lib
          WEBP_OLD_ID=$(otool -D "${WEBP_LIBDIR}/libwebp.7.dylib" | tail -1)
          for DIR in lib64 libarm64; do
            mkdir -p "ddnet-libs/webp/mac/${DIR}"
            cp "${WEBP_LIBDIR}/libwebp.7.dylib" "ddnet-libs/webp/mac/${DIR}/" 2>/dev/null || true
            cp "${WEBP_LIBDIR}/libwebpdemux.2.dylib" "ddnet-libs/webp/mac/${DIR}/" 2>/dev/null || true
            cp "${WEBP_LIBDIR}/libwebpmux.3.dylib" "ddnet-libs/webp/mac/${DIR}/" 2>/dev/null || true
            install_name_tool -id @rpath/libwebp.7.dylib "ddnet-libs/webp/mac/${DIR}/libwebp.7.dylib" 2>/dev/null || true
            install_name_tool -id @rpath/libwebpdemux.2.dylib "ddnet-libs/webp/mac/${DIR}/libwebpdemux.2.dylib" 2>/dev/null || true
            install_name_tool -id @rpath/libwebpmux.3.dylib "ddnet-libs/webp/mac/${DIR}/libwebpmux.3.dylib" 2>/dev/null || true
            if [ -n "${WEBP_OLD_ID}" ]; then
              install_name_tool -change "${WEBP_OLD_ID}" @rpath/libwebp.7.dylib "ddnet-libs/webp/mac/${DIR}/libwebpdemux.2.dylib" 2>/dev/null || true
              install_name_tool -change "${WEBP_OLD_ID}" @rpath/libwebp.7.dylib "ddnet-libs/webp/mac/${DIR}/libwebpmux.3.dylib" 2>/dev/null || true
            fi
          done
          echo "Verifying WebP install_name:"
          otool -D ddnet-libs/webp/mac/libarm64/libwebp.7.dylib 2>/dev/null || true
          ls -la ddnet-libs/webp/mac/lib64/

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          -DDOWNLOAD_GTEST=ON

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DPREFER_BUNDLED_LIBS=ON \
            -DDOWNLOAD_GTEST=ON \
            -DCMAKE_OSX_SYSROOT="${SDKROOT}"

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          -DPREFER_BUNDLED_LIBS=ON
          -DDOWNLOAD_GTEST=ON
          -DCMAKE_OBJECT_PATH_MAX=1024

      - name: Build client (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build --target game-client --parallel $(nproc)

      - name: Build client (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --target game-client --parallel $env:NUMBER_OF_PROCESSORS

      - name: Run tests (Linux/macOS)
        if: runner.os != 'Windows' && github.event.inputs.skip_tests != 'true'
        run: cmake --build build --target run_tests --parallel

      - name: Run tests (Windows)
        if: runner.os == 'Windows' && github.event.inputs.skip_tests != 'true'
        shell: pwsh
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --target run_tests --parallel

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build --target package_default --parallel

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --target package_default --parallel

      - name: Create 7z package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $packDir = Get-ChildItem -Path build -Directory -Filter "pack_*_zip" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $packDir) {
            throw "No pack directory found"
          }
          Write-Host "Found pack directory: $($packDir.FullName)"
          $innerDir = Get-ChildItem -Path $packDir.FullName -Directory | Select-Object -First 1
          if (-not $innerDir) {
            throw "No inner directory found in pack directory"
          }
          $sevenZipName = "$($innerDir.Name).7z"
          Write-Host "Creating 7z from: $($innerDir.FullName)"
          Write-Host "Output: $sevenZipName"
          Push-Location $packDir.FullName
          7z a -t7z -mx=9 "../$sevenZipName" $innerDir.Name
          Pop-Location
          Move-Item "build/$sevenZipName" dist/ -Force
          Write-Host "Created: dist/$sevenZipName"

      - name: Collect package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          mkdir -p dist
          PKG="$(find build -type f -name "*.${{ matrix.package_ext }}" ! -name "*-src*" | head -n 1)"
          if [ -z "${PKG}" ]; then
            echo "No package with extension .${{ matrix.package_ext }} found under build/"
            exit 1
          fi
          cp "${PKG}" "dist/${{ matrix.output_name }}"
          ls -lah dist

      - name: Collect package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path dist)) { New-Item -ItemType Directory -Path dist -Force | Out-Null }
          Write-Host "Looking for *.${{ matrix.package_ext }} in build/..."
          Get-ChildItem -Path build -Recurse -File -Filter "*.${{ matrix.package_ext }}" | ForEach-Object { Write-Host "  Found: $($_.FullName)" }
          $pkg = Get-ChildItem -Path build -File -Filter "*.${{ matrix.package_ext }}" |
            Where-Object { $_.Name -notmatch "-src\\." } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $pkg) {
            $pkg = Get-ChildItem -Path build -Recurse -File -Filter "*.${{ matrix.package_ext }}" |
              Where-Object { $_.Name -notmatch "-src\\." -and $_.Name -match "QmClient" } |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1
          }
          if (-not $pkg) {
            throw "No package with extension .${{ matrix.package_ext }} found under build/"
          }
          Write-Host "Copying: $($pkg.FullName) -> dist/${{ matrix.output_name }}"
          Copy-Item -Path $pkg.FullName -Destination "dist/${{ matrix.output_name }}"
          Get-ChildItem -Path dist

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

      - name: Verify build artifact
        if: runner.os != 'Windows'
        run: |
          if [ ! -f "dist/${{ matrix.output_name }}" ]; then
            echo "Build artifact not found!"
            exit 1
          fi
          FILE_SIZE=$(stat -c%s "dist/${{ matrix.output_name }}" 2>/dev/null || stat -f%z "dist/${{ matrix.output_name }}")
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "Build artifact too small: $FILE_SIZE bytes"
            exit 1
          fi
          echo "Build artifact verified: $FILE_SIZE bytes"

      - name: Verify build artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @(
            "dist/${{ matrix.output_name }}"
            (Get-ChildItem -Path dist -Filter "*.7z" | Select-Object -First 1).FullName
          )
          foreach ($file in $files) {
            if (-not (Test-Path $file)) {
              throw "Build artifact not found: $file"
            }
            $size = (Get-Item $file).Length
            if ($size -lt 1000000) {
              throw "Build artifact too small: $file ($size bytes)"
            }
            Write-Host "Verified: $file ($size bytes)"
          }

      - name: Build summary
        if: always()
        shell: bash
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: ${{ matrix.name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **OS**: ${{ matrix.os }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Type**: ${{ env.BUILD_TYPE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "- **Artifacts**: ${{ matrix.output_name }}, QmClient-*-win64.7z" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Artifact**: ${{ matrix.output_name }}" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Show ccache statistics (Linux/macOS)
        if: always() && runner.os != 'Windows'
        run: ccache --show-stats || true

  build_android:
    name: Android
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    env:
      ANDROID_APP_NAME: QmClient
      ANDROID_PACKAGE_NAME: org.ddnet.client
      ANDROID_BUILD_DIR: build-android-release
      ANDROID_NDK_VERSION: "26.1.10909125"
      # Debug keystore credentials - safe to commit as these are standard Android debug keys
      # For production releases, use GitHub Secrets for keystore credentials
      TW_KEY_NAME: /home/runner/.android/debug.keystore
      TW_KEY_PW: android
      TW_KEY_ALIAS: androiddebugkey
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h

      - name: Checkout source
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Update version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_VERSION#v}"
          echo "Updating TCLIENT_VERSION to $VERSION"
          sed -i 's/^#define TCLIENT_VERSION ".*"/#define TCLIENT_VERSION "'"$VERSION"'"/' src/game/version.h
          echo "Updated version.h:"
          grep "TCLIENT_VERSION" src/game/version.h

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup ccache (Android)
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          key: android-${{ runner.os }}
          max-size: 500M

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cache cargo-ndk
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-ndk
          key: cargo-ndk-${{ runner.os }}

      - name: Cache Android NDK
        uses: actions/cache@v5
        with:
          path: |
            ~/.android/sdk/ndk
            ~/.android/sdk/platforms
            ~/.android/sdk/build-tools
          key: android-sdk-ndk-${{ env.ANDROID_NDK_VERSION }}

      - name: Cache apt dependencies (Android)
        uses: actions/cache@v5
        with:
          path: |
            /var/cache/apt/archives/*.deb
            /var/lib/apt/lists
          key: apt-android-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Cache Rust Android targets
        uses: actions/cache@v5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-android-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rust-android-${{ runner.os }}-

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config curl python3 python3-pip \
            glslang-tools spirv-tools ccache
          if [ ! -f ~/.cargo/bin/cargo-ndk ]; then
            cargo install cargo-ndk
          fi
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add aarch64-linux-android
          rustup target add x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;${{ env.ANDROID_NDK_VERSION }}"
          yes | sdkmanager --licenses

      - name: Cache WebP for Android
        id: cache-webp
        uses: actions/cache@v5
        with:
          path: ddnet-libs/webp/android
          key: webp-android-v1.6.0-${{ hashFiles('.github/workflows/build.yml', 'ddnet-libs/webp/**') }}
          restore-keys: webp-android-v1.6.0-

      - name: Build WebP for Android (Parallel)
        if: steps.cache-webp.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --branch v1.6.0 https://chromium.googlesource.com/webm/libwebp
          cd libwebp
          
          ANDROID_NDK_HOME="$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}"
          
          # Build all ABIs in parallel using background jobs
          build_abi() {
            local ABI=$1
            local DIR=$2
            mkdir -p "build-android/${ABI}"
            cmake -S . -B "build-android/${ABI}" \
              -G Ninja \
              -DCMAKE_TOOLCHAIN_FILE="${ANDROID_NDK_HOME}/build/cmake/android.toolchain.cmake" \
              -DANDROID_ABI="${ABI}" \
              -DANDROID_PLATFORM=android-24 \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX="${PWD}/install-${ABI}" \
              -DWEBP_BUILD_ANIM_UTILS=OFF \
              -DWEBP_BUILD_CWEBP=OFF \
              -DWEBP_BUILD_DWEBP=OFF \
              -DWEBP_BUILD_EXTRAS=OFF \
              -DWEBP_BUILD_GIF2WEBP=OFF \
              -DWEBP_BUILD_IMG2WEBP=OFF \
              -DWEBP_BUILD_VWEBP=OFF \
              -DWEBP_BUILD_WEBPINFO=OFF \
              -DWEBP_BUILD_WEBPMUX=OFF \
              -DWEBP_BUILD_WEBP_JS=OFF 2>&1 | tee "build-${ABI}.log"
            cmake --build "build-android/${ABI}" --parallel 2>&1 | tee -a "build-${ABI}.log"
            cmake --install "build-android/${ABI}" 2>&1 | tee -a "build-${ABI}.log"
            echo "Completed ${ABI}"
          }
          
          # Start all builds in parallel
          build_abi armeabi-v7a libarm &
          build_abi arm64-v8a libarm64 &
          build_abi x86 lib32 &
          build_abi x86_64 lib64 &
          
          # Wait for all background jobs
          wait
          
          # Copy to ddnet-libs
          mkdir -p ../ddnet-libs/webp/include/webp
          cp -r install-arm64-v8a/include/webp/* ../ddnet-libs/webp/include/webp/
          
          for ABI in armeabi-v7a arm64-v8a x86 x86_64; do
            case "${ABI}" in
              armeabi-v7a) DIR="libarm" ;;
              arm64-v8a) DIR="libarm64" ;;
              x86) DIR="lib32" ;;
              x86_64) DIR="lib64" ;;
            esac
            mkdir -p "../ddnet-libs/webp/android/${DIR}"
            cp "install-${ABI}/lib/libwebp.a" "../ddnet-libs/webp/android/${DIR}/"
            cp "install-${ABI}/lib/libwebpdemux.a" "../ddnet-libs/webp/android/${DIR}/" 2>/dev/null || true
            cp "install-${ABI}/lib/libwebpmux.a" "../ddnet-libs/webp/android/${DIR}/" 2>/dev/null || true
          done
          
          echo "All WebP builds completed"

      - name: Prepare Android signing keystore
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${TW_KEY_NAME}")"
          if [ ! -f "${TW_KEY_NAME}" ]; then
            keytool -genkeypair -v \
              -keystore "${TW_KEY_NAME}" \
              -storepass "${TW_KEY_PW}" \
              -keypass "${TW_KEY_PW}" \
              -alias "${TW_KEY_ALIAS}" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=GitHub Actions, OU=CI, O=QmClient, L=Unknown, ST=Unknown, C=US"
          fi

      - name: Build Android APK/AAB
        shell: bash
        run: |
          chmod +x scripts/android/cmake_android.sh
          scripts/android/cmake_android.sh all "${ANDROID_APP_NAME}" "${ANDROID_PACKAGE_NAME}" Release "${ANDROID_BUILD_DIR}"

      - name: Collect Android package
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "${ANDROID_BUILD_DIR}/${ANDROID_APP_NAME}.apk" dist/QmClient-android.apk
          cp "${ANDROID_BUILD_DIR}/${ANDROID_APP_NAME}.aab" dist/QmClient-android.aab
          ls -lah dist

      - name: Upload WebP libraries (for ddnet-libs)
        if: steps.cache-webp.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: webp-android-libs
          path: |
            ddnet-libs/webp/android/
            ddnet-libs/webp/include/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Android artifact
        uses: actions/upload-artifact@v6
        with:
          name: packaged-android
          path: |
            dist/QmClient-android.apk
            dist/QmClient-android.aab
          if-no-files-found: error
          retention-days: 14

      - name: Verify build artifacts
        run: |
          for file in dist/QmClient-android.apk dist/QmClient-android.aab; do
            if [ ! -f "$file" ]; then
              echo "Build artifact not found: $file"
              exit 1
            fi
            FILE_SIZE=$(stat -c%s "$file")
            if [ "$FILE_SIZE" -lt 1000000 ]; then
              echo "Build artifact too small: $file ($FILE_SIZE bytes)"
              exit 1
            fi
            echo "Verified: $file ($FILE_SIZE bytes)"
          done

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: Android" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifacts**: QmClient-android.apk, QmClient-android.aab" >> $GITHUB_STEP_SUMMARY

      - name: Show ccache statistics (Android)
        if: always()
        run: ccache --show-stats || true

  release-desktop:
    name: Publish Desktop Release
    runs-on: ubuntu-22.04
    needs:
      - build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: packaged-*
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lah release-assets

      - name: Create release and upload desktop assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/QmClient-windows.zip
            release-assets/QmClient-*-win64.7z
            release-assets/QmClient-ubuntu.tar.xz
            release-assets/QmClient-macOS.dmg

  release-android:
    name: Publish Android Release
    runs-on: ubuntu-22.04
    needs:
      - build_android
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v5
        with:
          name: packaged-android
          path: release-assets

      - name: List release assets
        run: ls -lah release-assets

      - name: Upload Android assets to release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          files: |
            release-assets/QmClient-android.apk
            release-assets/QmClient-android.aab
