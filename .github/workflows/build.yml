name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "V*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-22.04
            package_ext: tar.xz
            output_name: TClient-ubuntu.tar.xz
            artifact_name: packaged-linux
          - name: Windows
            os: windows-2022
            package_ext: zip
            output_name: TClient-windows.zip
            artifact_name: packaged-windows
          - name: macOS
            os: macos-13
            package_ext: dmg
            output_name: TClient-macOS.dmg
            artifact_name: packaged-macos

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config python3 python3-pip \
            libfreetype6-dev libnotify-dev libsdl2-dev libsqlite3-dev \
            libgl1-mesa-dev \
            libvulkan-dev glslang-tools spirv-tools \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswresample-dev libswscale-dev libx264-dev \
            libpng-dev libcurl4-openssl-dev libssl-dev \
            libogg-dev libopus-dev libopusfile-dev libwavpack-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          export HOMEBREW_NO_AUTO_UPDATE=1
          brew install \
            cmake ninja pkg-config python \
            freetype sdl2 libpng libogg opus opusfile sqlite wavpack
          python3 -m pip install --upgrade pip
          python3 -m pip install dmgbuild
          USER_BASE="$(python3 -m site --user-base)"
          echo "${USER_BASE}/bin" >> "$GITHUB_PATH"

      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DDOWNLOAD_GTEST=ON

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64
          -DDOWNLOAD_GTEST=ON

      - name: Build client (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build --target game-client --parallel

      - name: Build client (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config Release --target game-client --parallel

      - name: Run tests (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build --target run_tests --parallel

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config Release --target run_tests --parallel

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build --target package_default --parallel

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config Release --target package_default --parallel

      - name: Collect package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          mkdir -p dist
          PKG="$(find build -type f -name "*.${{ matrix.package_ext }}" ! -name "*-src*" | head -n 1)"
          if [ -z "${PKG}" ]; then
            echo "No package with extension .${{ matrix.package_ext }} found under build/"
            exit 1
          fi
          cp "${PKG}" "dist/${{ matrix.output_name }}"
          ls -lah dist

      - name: Collect package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $pkg = Get-ChildItem -Path build -Recurse -File -Filter "*.${{ matrix.package_ext }}" |
            Where-Object { $_.Name -notmatch "-src\\." } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $pkg) {
            throw "No package with extension .${{ matrix.package_ext }} found under build/"
          }
          Copy-Item -Path $pkg.FullName -Destination "dist\\${{ matrix.output_name }}"
          Get-ChildItem -Path dist

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.output_name }}
          if-no-files-found: error
          retention-days: 14

  build_android:
    name: Android
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    env:
      ANDROID_APP_NAME: TClient
      ANDROID_PACKAGE_NAME: org.ddnet.client
      ANDROID_BUILD_DIR: build-android-release
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config curl python3 python3-pip
          cargo install cargo-ndk
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add aarch64-linux-android
          rustup target add x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;26.1.10909125"
          yes | sdkmanager --licenses

      - name: Build Android APK/AAB
        shell: bash
        run: |
          chmod +x scripts/android/cmake_android.sh
          scripts/android/cmake_android.sh all "${ANDROID_APP_NAME}" "${ANDROID_PACKAGE_NAME}" Release "${ANDROID_BUILD_DIR}"

      - name: Collect Android package
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "${ANDROID_BUILD_DIR}/${ANDROID_APP_NAME}.apk" dist/TClient-android.apk
          cp "${ANDROID_BUILD_DIR}/${ANDROID_APP_NAME}.aab" dist/TClient-android.aab
          ls -lah dist

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: packaged-android
          path: |
            dist/TClient-android.apk
            dist/TClient-android.aab
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs:
      - build
      - build_android
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: packaged-*
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lah release-assets

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/TClient-windows.zip
            release-assets/TClient-ubuntu.tar.xz
            release-assets/TClient-macOS.dmg
            release-assets/TClient-android.apk
            release-assets/TClient-android.aab
